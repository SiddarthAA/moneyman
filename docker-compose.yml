services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    # Bind to all interfaces so Tailscale (and LAN) can reach the API.
    # Host port 8999 → container port 8000.
    ports:
      - "0.0.0.0:8999:8000"
    env_file:
      - .env              # must contain GROQ_API_KEY
    environment:
      DATABASE_URL: sqlite:////app/data/moneyman.db
      UPLOAD_DIR: /app/uploads
      # Set CORS_ORIGINS in .env to include your Tailscale IP:
      #   CORS_ORIGINS=http://localhost:3999,http://<TAILSCALE_IP>:3999
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3999,http://127.0.0.1:3999}
    volumes:
      - moneyman_data:/app/data        # SQLite database (persistent)
      - moneyman_uploads:/app/uploads  # uploaded bill images (persistent)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Leave NEXT_PUBLIC_API_URL unset — the /backend proxy handles routing.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      # Server-side proxy targets the backend container directly (no CORS).
      INTERNAL_API_URL: http://backend:8000
    # Bind to all interfaces so Tailscale (and LAN) can reach the UI.
    # Host port 3999 → container port 3000.
    ports:
      - "0.0.0.0:3999:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Named volumes – data survives container restarts and re-deploys
volumes:
  moneyman_data:
  moneyman_uploads:
